name: Build AIFI Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake for C++
        run: cmake -B AIFI-Native/build -S AIFI-Native

      - name: Build C++ DLL
        run: cmake --build AIFI-Native/build --config Release

      - name: Move DLL to Java Resources
        shell: bash
        run: |
          mkdir -p src/main/resources/natives
          cp AIFI-Native/build/Release/aifi_engine.dll src/main/resources/natives/

      - name: Build Fabric Mod with Gradle
        run: ./gradlew build

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: AIFI-Craft-Mod
          path: build/libs/*.jar
